<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Panel Admin')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="display-5">
                <i class="fas fa-user-shield text-success me-3"></i>
                Hola, <span th:text="${adminName}">Administrador</span>
            </h1>
            <p class="text-muted">Panel de control del sistema.</p>
            <hr>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow-sm">
                <div class="card-body">
                    <i class="fas fa-box-open fa-3x text-success mb-2"></i>
                    <h3 class="card-title fw-bold" th:text="${totalProducts}">0</h3>
                    <p class="card-text text-muted">Productos</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow-sm">
                <div class="card-body">
                    <i class="fas fa-tractor fa-3x text-success mb-2"></i>
                    <h3 class="card-title fw-bold" th:text="${totalFarmers}">0</h3>
                    <p class="card-text text-muted">Agricultores</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow-sm">
                <div class="card-body">
                    <i class="fas fa-shopping-cart fa-3x text-success mb-2"></i>
                    <h3 class="card-title fw-bold" th:text="${totalBuyers}">0</h3>
                    <p class="card-text text-muted">Compradores</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-cog me-2"></i>Administración</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3 mb-2">
                            <a th:href="@{/admin/products}" class="btn btn-outline-success w-100 py-3">
                                <i class="fas fa-box-open me-2"></i>Gestionar Productos
                            </a>
                        </div>
                        <div class="col-md-3 mb-2">
                            <a href="#" class="btn btn-outline-success w-100 py-3">
                                <i class="fas fa-users me-2"></i>Gestionar Usuarios
                            </a>
                        </div>
                        <div class="col-md-3 mb-2">
                            <a href="#" class="btn btn-outline-success w-100 py-3">
                                <i class="fas fa-chart-line me-2"></i>Estadísticas
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
