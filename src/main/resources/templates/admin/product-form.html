<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Formulario Producto')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-box-open me-2"></i>
                        <span th:text="${product.id != null} ? 'Editar Producto' : 'Nuevo Producto'"></span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" th:field="*{name}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Variedad</label>
                                <input type="text" th:field="*{variety}" class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Categoría</label>
                                <select th:field="*{category}" class="form-select" required>
                                    <option value="">Seleccionar</option>
                                    <option value="Fruta">Fruta</option>
                                    <option value="Cítrico">Cítrico</option>
                                    <option value="Grano">Grano</option>
                                    <option value="Especial">Especial</option>
                                    <option value="Hortaliza">Hortaliza</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Unidad</label>
                                <select th:field="*{unit}" class="form-select" required>
                                    <option value="">Seleccionar</option>
                                    <option value="kg">kg</option>
                                    <option value="unidad">unidad</option>
                                    <option value="libra">libra</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Descripción</label>
                                <input type="text" th:field="*{description}" class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio mínimo (S/)</label>
                                <input type="number" step="0.01" th:field="*{minPrice}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio máximo (S/)</label>
                                <input type="number" step="0.01" th:field="*{maxPrice}" class="form-control" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Inicio de temporada (mes)</label>
                                <select th:field="*{seasonStart}" class="form-select">
                                    <option value="">Seleccionar</option>
                                    <option value="01">Enero</option>
                                    <option value="02">Febrero</option>
                                    <option value="03">Marzo</option>
                                    <option value="04">Abril</option>
                                    <option value="05">Mayo</option>
                                    <option value="06">Junio</option>
                                    <option value="07">Julio</option>
                                    <option value="08">Agosto</option>
                                    <option value="09">Septiembre</option>
                                    <option value="10">Octubre</option>
                                    <option value="11">Noviembre</option>
                                    <option value="12">Diciembre</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Fin de temporada (mes)</label>
                                <select th:field="*{seasonEnd}" class="form-select">
                                    <option value="">Seleccionar</option>
                                    <option value="01">Enero</option>
                                    <option value="02">Febrero</option>
                                    <option value="03">Marzo</option>
                                    <option value="04">Abril</option>
                                    <option value="05">Mayo</option>
                                    <option value="06">Junio</option>
                                    <option value="07">Julio</option>
                                    <option value="08">Agosto</option>
                                    <option value="09">Septiembre</option>
                                    <option value="10">Octubre</option>
                                    <option value="11">Noviembre</option>
                                    <option value="12">Diciembre</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-save me-2"></i>Guardar Producto
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
