<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Panel del Comprador')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="display-5">
                <i class="fas fa-shopping-cart text-success me-3"></i>
                Hola, <span th:text="${buyerName}">Comprador</span>
            </h1>
            <p class="text-muted">Encuentra los mejores productos frescos cerca de ti.</p>
            <hr>
        </div>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow-sm">
                <div class="card-body">
                    <i class="fas fa-apple-alt fa-3x text-success mb-2"></i>
                    <h3 class="card-title fw-bold" th:text="${totalHarvests}">0</h3>
                    <p class="card-text text-muted">Cosechas disponibles</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow-sm">
                <div class="card-body">
                    <i class="fas fa-store fa-3x text-success mb-2"></i>
                    <h3 class="card-title fw-bold" th:text="${totalFairsNearby}">0</h3>
                    <p class="card-text text-muted">Ferias cercanas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center border-success shadow-sm">
                <div class="card-body">
                    <i class="fas fa-envelope fa-3x text-success mb-2"></i>
                    <h3 class="card-title fw-bold" th:text="${recentContacts}">0</h3>
                    <p class="card-text text-muted">Contactos realizados</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Acciones rápidas -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-bolt me-2"></i>Explorar</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <a th:href="@{/harvests}" class="btn btn-outline-success w-100 py-3">
                                <i class="fas fa-apple-alt me-2"></i>Ver Cosechas
                            </a>
                        </div>
                        <div class="col-md-4 mb-2">
                            <a th:href="@{/map}" class="btn btn-outline-success w-100 py-3">
                                <i class="fas fa-map-marked-alt me-2"></i>Ver Mapa
                            </a>
                        </div>
                        <div class="col-md-4 mb-2">
                            <a th:href="@{/fairs}" class="btn btn-outline-success w-100 py-3">
                                <i class="fas fa-store me-2"></i>Ver Ferias
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Productos destacados -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-star me-2"></i>Productos Destacados</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <div class="card h-100 text-center">
                                <div class="card-body">
                                    <i class="fas fa-mango fa-3x text-success mb-2"></i>
                                    <h6>Mango Criollo</h6>
                                    <p class="text-muted small">Chulucanas</p>
                                    <a th:href="@{/harvests}" class="btn btn-sm btn-success">Ver</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="card h-100 text-center">
                                <div class="card-body">
                                    <i class="fas fa-seedling fa-3x text-success mb-2"></i>
                                    <h6>Cacao Fino</h6>
                                    <p class="text-muted small">Morropón</p>
                                    <a th:href="@{/harvests}" class="btn btn-sm btn-success">Ver</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="card h-100 text-center">
                                <div class="card-body">
                                    <i class="fas fa-mug-hot fa-3x text-success mb-2"></i>
                                    <h6>Café de Altura</h6>
                                    <p class="text-muted small">Huancabamba</p>
                                    <a th:href="@{/harvests}" class="btn btn-sm btn-success">Ver</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
