<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Acceso Denegado')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="min-height: 70vh;">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">

                    <div class="mb-4">
                        <i class="fas fa-ban text-danger" style="font-size: 5rem;"></i>
                    </div>

                    <h1 class="display-4 fw-bold text-danger">Acceso Denegado</h1>
                    <p class="lead text-muted">No tienes permisos para acceder a esta página.</p>

                    <div class="alert alert-warning mt-4">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span th:text="${error} ?: 'Tu rol actual no tiene acceso a esta sección.'">Tu rol actual no tiene acceso a esta sección.</span>
                    </div>

                    <div class="mt-4 p-3 bg-light rounded">
                        <p class="mb-1">
                            <strong>Usuario:</strong>
                            <span sec:authentication="name">usuario@ejemplo.com</span>
                        </p>
                        <p class="mb-0">
                            <strong>Rol:</strong>
                            <span class="badge" sec:authentication="principal.authorities"
                                  th:text="${#authentication.principal.authorities}">ROLE_USER</span>
                        </p>
                    </div>

                    <div class="mt-4 d-flex justify-content-center gap-3">
                        <a th:href="@{/}" class="btn btn-success">
                            <i class="fas fa-home me-2"></i>Ir al Inicio
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Volver
                        </a>
                        <a th:href="@{/logout}" class="btn btn-outline-danger">
                            <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
