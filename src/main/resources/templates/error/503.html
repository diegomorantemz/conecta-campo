<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Servicio No Disponible')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="min-height: 70vh;">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-server text-warning" style="font-size: 5rem;"></i>
                    </div>
                    <h1 class="display-4 fw-bold text-warning">503</h1>
                    <h2 class="text-muted">Servicio No Disponible</h2>
                    <p class="lead text-muted">El servidor está temporalmente sobrecargado o en mantenimiento.</p>
                    <div class="alert alert-info mt-3">
                        <i class="fas fa-clock me-2"></i>
                        Por favor, intenta más tarde.
                    </div>
                    <div class="mt-4">
                        <a th:href="@{/}" class="btn btn-success">
                            <i class="fas fa-home me-2"></i>Ir al Inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
