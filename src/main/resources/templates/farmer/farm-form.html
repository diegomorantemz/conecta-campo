<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Formulario de Finca')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-tractor me-2"></i>
                        <span th:text="${farm.id != null} ? 'Editar Finca' : 'Nueva Finca'"></span>
                    </h4>
                </div>
                <div class="card-body">

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/farmer/farms/save}" th:object="${farm}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Nombre de la finca *</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Distrito *</label>
                            <input type="text" th:field="*{district}" class="form-control" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Latitud</label>
                                <input type="number" step="any" th:field="*{locationLat}" class="form-control" placeholder="-5.0925">
                                <small class="text-muted">Ej: -5.0925 (opcional)</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Longitud</label>
                                <input type="number" step="any" th:field="*{locationLng}" class="form-control" placeholder="-80.1625">
                                <small class="text-muted">Ej: -80.1625 (opcional)</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="Describe tu finca, productos que cultivas, etc."></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-save me-2"></i>Guardar Finca
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
