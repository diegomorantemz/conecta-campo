<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Mis Cosechas')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="display-5">
                    <i class="fas fa-apple-alt text-success me-3"></i>
                    Mis Cosechas
                </h1>
                <a th:href="@{/farmer/harvests/create}" class="btn btn-success">
                    <i class="fas fa-plus-circle me-2"></i>Nueva Cosecha
                </a>
            </div>
            <p class="text-muted">Gestiona tus cosechas publicadas.</p>
            <hr>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${harvests.isEmpty()}" class="alert alert-info text-center">
                <i class="fas fa-info-circle me-2"></i>
                No tienes cosechas registradas aún.
                <a th:href="@{/farmer/harvests/create}" class="alert-link">¡Crea tu primera cosecha!</a>
            </div>
            <div th:unless="${harvests.isEmpty()}">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </thead>
                        </thead>
                        <tbody>
                        <tr th:each="harvest : ${harvests}">
                            <td>
                                <span th:text="${harvest.product.name}"></span>
                                <span th:text="${harvest.product.variety} != null ? ' - ' + ${harvest.product.variety} : ''"></span>
                            </td>
                            <td><span th:text="${harvest.quantity}"></span> kg</td>
                            <td>S/ <span th:text="${harvest.priceSuggested}"></span></td>
                            <td>
                                    <span class="badge" th:classappend="${harvest.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${harvest.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(harvest.harvestDate, 'dd/MM/yyyy')}"></td>
                            <td>
                                <a th:href="@{/farmer/harvests/edit/{id}(id=${harvest.id})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="fas fa-edit"></i> Editar
                                </a>
                                <a th:href="@{/farmer/harvests/delete/{id}(id=${harvest.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Estás seguro de eliminar esta cosecha?')">
                                    <i class="fas fa-trash"></i> Eliminar
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
