<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ConectaCampo - Plataforma que conecta agricultores locales con compradores directos en Piura">
    <meta name="author" content="ConectaCampo">
    <title th:text="${title} + ' | ConectaCampo'">ConectaCampo</title>

    <script>
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <script src="/js/session.js"></script>
    <script>
        verifySession();
    </script>
</head>
