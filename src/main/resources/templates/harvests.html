<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Cosechas Disponibles')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h1 class="text-center mb-4">Cosechas Disponibles</h1>
    <p class="text-center text-muted mb-4">Productos frescos directamente de nuestros agricultores</p>

    <div class="row mb-4">
        <div class="col-md-4">
            <select class="form-select" id="filterProduct">
                <option value="">Todos los productos</option>
                <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.name} + ' ' + ${product.variety}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <select class="form-select" id="filterDistrict">
                <option value="">Todos los distritos</option>
                <option>Chulucanas</option>
                <option>Tambogrande</option>
                <option>Morropón</option>
                <option>Piura</option>
                <option>Huancabamba</option>
                <option>Ayabaca</option>
                <option>Sullana</option>
            </select>
        </div>
        <div class="col-md-4">
            <button class="btn btn-success w-100" id="searchBtn">Buscar</button>
        </div>
    </div>

    <div class="row" id="harvestsContainer">
        <div th:each="harvest : ${harvests}" class="col-md-4 mb-4">
            <div class="card h-100" th:classappend="${harvest.product.category == 'Especial'} ? 'border-warning' : ''">
                <div class="card-body">
            <span class="badge mb-2" th:classappend="${harvest.product.category == 'Especial'} ? 'bg-warning text-dark' : 'bg-success'"
                  th:text="${harvest.product.category == 'Especial'} ? '✨ Producto Especial' : 'Producto Estrella'">
            </span>

                    <h5 class="card-title">
                        <span th:text="${harvest.product.name}"></span>
                        <span th:text="${harvest.product.variety != null} ? ' ' + ${harvest.product.variety} : ''"></span>
                    </h5>

                    <p class="card-text">
                        Agricultor: <span th:text="${harvest.farm.user.name}"></span>
                        - <span th:text="${harvest.farm.district}"></span>
                    </p>

                    <p class="card-text">Cantidad: <span th:text="${harvest.quantity}"></span> kg</p>

                    <p class="fw-bold text-success">
                        Precio: S/ <span th:text="${harvest.priceSuggested}"></span>/kg
                    </p>

                    <p class="small text-muted" th:if="${harvest.harvestDate != null}">
                        Cosecha: <span th:text="${harvest.harvestDate}"></span>
                    </p>
                    <p class="small text-muted" th:unless="${harvest.harvestDate != null}">
                        Cosecha disponible ahora
                    </p>

                    <p th:if="${harvest.priceFairRef != null}" class="small text-success">
                        Precio justo sugerido: S/ <span th:text="${harvest.priceFairRef}"></span>/kg
                    </p>

                    <button class="btn btn-outline-success btn-sm" data-bs-toggle="modal" data-bs-target="#contactModal"
                            th:data-harvest-id="${harvest.id}" th:data-product-name="${harvest.product.name}">
                        Contactar agricultor
                    </button>
                </div>
            </div>
        </div>

        <div th:if="${harvests.isEmpty()}" class="col-12 text-center">
            <div class="alert alert-info">
                No hay cosechas disponibles en este momento. Vuelve pronto.
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Contactar Agricultor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="contactForm">
                    <div class="mb-3">
                        <label class="form-label">Tu nombre</label>
                        <input type="text" class="form-control" id="contactName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono / WhatsApp</label>
                        <input type="tel" class="form-control" id="contactPhone" placeholder="Ej: 987654321">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" id="contactMessage" rows="3" placeholder="¿Cuántos kilos deseas comprar?"></textarea>
                    </div>
                    <input type="hidden" id="contactHarvestId">
                    <button type="submit" class="btn btn-success w-100">Enviar mensaje</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

    document.querySelectorAll('[data-bs-toggle="modal"]').forEach(button => {
        button.addEventListener('click', function() {
            const harvestId = this.getAttribute('data-harvest-id');
            const productName = this.getAttribute('data-product-name');
            document.getElementById('contactHarvestId').value = harvestId;
            document.getElementById('contactMessage').placeholder = `Hola, estoy interesado en comprar ${productName}. ¿Cuántos kilos tienes disponibles?`;
        });
    });


    document.getElementById('searchBtn')?.addEventListener('click', function() {
        const product = document.getElementById('filterProduct').value;
        const district = document.getElementById('filterDistrict').value;

        console.log('Filtrar por:', {product, district});
        alert('Funcionalidad de filtro próximamente');
    });
</script>
</body>
</html>
