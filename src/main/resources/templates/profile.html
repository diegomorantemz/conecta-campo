<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:temporals="http://www.thymeleaf.org/thymeleaf-extras-temporals">
<head th:replace="fragments/head :: head('Mi Perfil')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1 class="display-5">
                <i class="fas fa-user-circle text-success me-3"></i>
                Mi Perfil
            </h1>
            <p class="text-muted">Gestiona tu información personal y contraseña.</p>
            <hr>
        </div>
    </div>

    <div class="row">

        <div class="col-md-7 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>Datos Personales</h5>
                </div>
                <div class="card-body">

                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form id="profileForm" th:action="@{/profile/update}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombres</label>
                                <input type="text" name="name" id="name" th:value="${user.name}" class="form-control"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ]+(?: [A-Za-zÁÉÍÓÚáéíóúñÑ]+)*"
                                       title="Solo letras y espacios entre palabras"
                                       oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ ]/g, ''); checkChanges()" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellidos</label>
                                <input type="text" name="lastname" id="lastname" th:value="${user.lastname}" class="form-control"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ]+(?: [A-Za-zÁÉÍÓÚáéíóúñÑ]+)*"
                                       title="Solo letras y espacios entre palabras"
                                       oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ ]/g, ''); checkChanges()" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" th:value="${user.dni}" class="form-control" disabled>
                            <small class="text-muted">El DNI no se puede modificar</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" th:value="${user.email}" class="form-control" disabled>
                            <small class="text-muted">El correo no se puede modificar</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="phone" id="phone" th:value="${user.phone}" class="form-control"
                                   maxlength="9"
                                   title="El teléfono debe tener 9 dígitos numéricos"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, ''); checkChanges()" required>
                            <small class="text-muted">9 dígitos, solo números (ej: 987654321)</small>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Departamento</label>
                                <select name="department" id="department" class="form-select" required>
                                    <option value="Piura" th:selected="${user.department == 'Piura'}">Piura</option>
                                </select>
                                <small class="text-muted">Solo Piura</small>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Provincia</label>
                                <select name="province" id="province" class="form-select" onchange="loadDistricts(); checkChanges();" required>
                                    <option value="">Selecciona una provincia</option>
                                    <option value="Piura" th:selected="${user.province == 'Piura'}">Piura</option>
                                    <option value="Sullana" th:selected="${user.province == 'Sullana'}">Sullana</option>
                                    <option value="Morropón" th:selected="${user.province == 'Morropón'}">Morropón</option>
                                    <option value="Huancabamba" th:selected="${user.province == 'Huancabamba'}">Huancabamba</option>
                                    <option value="Ayabaca" th:selected="${user.province == 'Ayabaca'}">Ayabaca</option>
                                    <option value="Talara" th:selected="${user.province == 'Talara'}">Talara</option>
                                    <option value="Paita" th:selected="${user.province == 'Paita'}">Paita</option>
                                    <option value="Sechura" th:selected="${user.province == 'Sechura'}">Sechura</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Distrito</label>
                                <select name="district" id="district" class="form-select" onchange="checkChanges()" required>
                                    <option value="">Selecciona un distrito</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="saveBtn" class="btn btn-success w-100" disabled>
                            <i class="fas fa-save me-2"></i>Guardar Cambios
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-5 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-key me-2"></i>Cambiar Contraseña</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Contraseña actual</label>
                            <div class="input-group">
                                <input type="password" name="currentPassword" id="currentPassword" class="form-control" required>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('currentPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <div class="input-group">
                                <input type="password" name="newPassword" id="newPassword" class="form-control" required>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('newPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small class="text-muted">Mínimo 6 caracteres</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar nueva contraseña</label>
                            <div class="input-group">
                                <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" required>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-outline-success w-100">
                            <i class="fas fa-lock me-2"></i>Actualizar Contraseña
                        </button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm mt-3">
                <div class="card-body">
                    <h6><i class="fas fa-info-circle text-success me-2"></i>Información de cuenta</h6>
                    <hr>
                    <p class="mb-1"><strong>Rol:</strong>
                        <span class="badge" th:classappend="${user.role == 'FARMER'} ? 'bg-success' : 'bg-info'"
                              th:text="${user.role}"></span>
                    </p>
                    <p class="mb-0"><strong>Miembro desde:</strong>
                        <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    document.addEventListener('DOMContentLoaded', function() {
        const provinciaSeleccionada = document.getElementById('province').value;
        if (provinciaSeleccionada) {
            loadDistricts();
        }
        checkChanges();
    });

    function loadDistricts() {
        const provinceSelect = document.getElementById('province');
        const districtSelect = document.getElementById('district');
        const provinceName = provinceSelect.value;

        const currentDistrict = '[[${user.district}]]';

        if (provinceName) {

            fetch(`/api/locations/provinces/name/${provinceName}`)
                .then(response => response.json())
                .then(province => {
                    if (province && province.id) {
                        return fetch(`/api/locations/districts/${province.id}`);
                    }
                    throw new Error('Provincia no encontrada');
                })
                .then(response => response.json())
                .then(districts => {
                    districtSelect.innerHTML = '<option value="">Selecciona un distrito</option>';
                    districts.forEach(district => {
                        const option = document.createElement('option');
                        option.value = district.name;
                        option.textContent = district.name;
                        // Si coincide con el distrito actual del usuario, seleccionarlo
                        if (district.name === currentDistrict) {
                            option.selected = true;
                        }
                        districtSelect.appendChild(option);
                    });
                    districtSelect.disabled = false;
                    checkChanges();
                })
                .catch(error => {
                    console.error('Error cargando distritos:', error);
                    districtSelect.innerHTML = '<option value="">Error al cargar distritos</option>';
                    districtSelect.disabled = true;
                });
        } else {
            districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
            districtSelect.disabled = true;
        }
    }

    function getCurrentValues() {
        return {
            name: document.getElementById('name').value,
            lastname: document.getElementById('lastname').value,
            phone: document.getElementById('phone').value,
            province: document.getElementById('province').value,
            district: document.getElementById('district').value
        };
    }

    let originalValues = {};

    function setOriginalValues() {
        originalValues = getCurrentValues();
    }

    function checkChanges() {
        const currentValues = getCurrentValues();
        const hasChanged = JSON.stringify(originalValues) !== JSON.stringify(currentValues);
        document.getElementById('saveBtn').disabled = !hasChanged;
    }

    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    document.getElementById('phone').addEventListener('keydown', function(e) {
        const allowedKeys = ['Backspace', 'Delete', 'Tab', 'ArrowLeft', 'ArrowRight', 'Home', 'End'];
        if (allowedKeys.includes(e.key)) {
            return;
        }
        if (!/^[0-9]$/.test(e.key)) {
            e.preventDefault();
        }
    });

    document.addEventListener('DOMContentLoaded', function() {

        setTimeout(function() {
            setOriginalValues();
            checkChanges();
        }, 500);
    });
</script>

</body>
</html>
