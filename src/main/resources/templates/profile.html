<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:temporals="http://www.thymeleaf.org/thymeleaf-extras-temporals">
<head th:replace="fragments/head :: head('Mi Perfil')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1 class="display-5">
                <i class="fas fa-user-circle text-success me-3"></i>
                Mi Perfil
            </h1>
            <p class="text-muted">Gestiona tu información personal y contraseña.</p>
            <hr>
        </div>
    </div>

    <div class="row">
        <!-- Datos personales -->
        <div class="col-md-7 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>Datos Personales</h5>
                </div>
                <div class="card-body">

                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/profile/update}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombres</label>
                                <input type="text" name="name" th:value="${user.name}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellidos</label>
                                <input type="text" name="lastname" th:value="${user.lastname}" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" th:value="${user.dni}" class="form-control" disabled>
                            <small class="text-muted">El DNI no se puede modificar</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" th:value="${user.email}" class="form-control" disabled>
                            <small class="text-muted">El correo no se puede modificar</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="phone" th:value="${user.phone}" class="form-control"
                                   pattern="[0-9]{9}"
                                   maxlength="9"
                                   title="El teléfono debe tener 9 dígitos numéricos"
                                   required>
                            <small class="text-muted">9 dígitos, solo números (ej: 987654321)</small>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Departamento</label>
                                <select name="department" class="form-select" required>
                                    <option value="Piura" th:selected="${user.department == 'Piura'}">Piura</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Provincia</label>
                                <select name="province" class="form-select" required>
                                    <option value="Piura" th:selected="${user.province == 'Piura'}">Piura</option>
                                    <option value="Sullana" th:selected="${user.province == 'Sullana'}">Sullana</option>
                                    <option value="Morropón" th:selected="${user.province == 'Morropón'}">Morropón</option>
                                    <option value="Huancabamba" th:selected="${user.province == 'Huancabamba'}">Huancabamba</option>
                                    <option value="Ayabaca" th:selected="${user.province == 'Ayabaca'}">Ayabaca</option>
                                    <option value="Talara" th:selected="${user.province == 'Talara'}">Talara</option>
                                    <option value="Paita" th:selected="${user.province == 'Paita'}">Paita</option>
                                    <option value="Sechura" th:selected="${user.province == 'Sechura'}">Sechura</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Distrito</label>
                                <input type="text" name="district" th:value="${user.district}" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-save me-2"></i>Guardar Cambios
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-key me-2"></i>Cambiar Contraseña</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Contraseña actual</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" name="newPassword" class="form-control" required>
                            <small class="text-muted">Mínimo 6 caracteres</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar nueva contraseña</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-outline-success w-100">
                            <i class="fas fa-lock me-2"></i>Actualizar Contraseña
                        </button>
                    </form>
                </div>
            </div>

            <!-- Información adicional -->
            <div class="card shadow-sm mt-3">
                <div class="card-body">
                    <h6><i class="fas fa-info-circle text-success me-2"></i>Información de cuenta</h6>
                    <hr>
                    <p class="mb-1"><strong>Rol:</strong>
                        <span class="badge" th:classappend="${user.role == 'FARMER'} ? 'bg-success' : 'bg-info'"
                              th:text="${user.role}"></span>
                    </p>
                    <p class="mb-0"><strong>Miembro desde:</strong>
                        <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
