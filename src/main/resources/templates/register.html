<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Registro')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="min-height: 70vh;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Crear Cuenta</h4>
                </div>
                <div class="card-body">

                    <!-- Mensajes de error o éxito -->
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- FORMULARIO -->
                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">

                        <!-- DNI -->
                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" th:field="*{dni}" class="form-control" placeholder="12345678" maxlength="8" required>
                        </div>

                        <!-- Nombres y Apellidos -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombres</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Juan" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellidos</label>
                                <input type="text" th:field="*{lastname}" class="form-control" placeholder="Pérez" required>
                            </div>
                        </div>

                        <!-- Email y Teléfono -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="ejemplo@conectacampo.pe" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" th:field="*{phone}" class="form-control"
                                       placeholder="987654321"
                                       pattern="[0-9]{9}"
                                       maxlength="9"
                                       title="El teléfono debe tener 9 dígitos numéricos"
                                       required>
                                <small class="text-muted">9 dígitos, solo números (ej: 987654321)</small>
                            </div>
                        </div>

                        <!-- Contraseña y Confirmar -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirmar contraseña</label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- Departamento -->
                        <div class="mb-3">
                            <label class="form-label">Departamento</label>
                            <select th:field="*{department}" id="department" class="form-select" required>
                                <option value="">Selecciona un departamento</option>
                            </select>
                        </div>

                        <!-- Provincia -->
                        <div class="mb-3">
                            <label class="form-label">Provincia</label>
                            <select th:field="*{province}" id="province" class="form-select" required disabled>
                                <option value="">Primero selecciona un departamento</option>
                            </select>
                        </div>

                        <!-- Distrito -->
                        <div class="mb-3">
                            <label class="form-label">Distrito</label>
                            <select th:field="*{district}" id="district" class="form-select" required disabled>
                                <option value="">Primero selecciona una provincia</option>
                            </select>
                        </div>

                        <!-- Tipo de cuenta -->
                        <div class="mb-3">
                            <label class="form-label">Tipo de cuenta</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{userType}" value="farmer" id="farmer">
                                <label class="form-check-label" for="farmer">
                                    <i class="fas fa-tractor"></i> Soy Agricultor
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{userType}" value="buyer" id="buyer">
                                <label class="form-check-label" for="buyer">
                                    <i class="fas fa-shopping-cart"></i> Soy Comprador
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Registrarme</button>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        ¿Ya tienes cuenta? <a th:href="@{/login}" class="text-success">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Cargar departamentos
    fetch('/api/locations/departments')
        .then(response => response.json())
        .then(departments => {
            const deptSelect = document.getElementById('department');
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept.id;
                option.textContent = dept.name;
                deptSelect.appendChild(option);
            });
        })
        .catch(error => console.error('Error cargando departamentos:', error));

    // Cuando cambia el departamento, cargar provincias y limpiar provincia/distrito
document.getElementById('department').addEventListener('change', function() {
    const deptId = this.value;
    const provinceSelect = document.getElementById('province');
    const districtSelect = document.getElementById('district');

    // Limpiar provincia seleccionada
    provinceSelect.value = "";

    if (deptId) {
        fetch(`/api/locations/provinces/${deptId}`)
            .then(response => response.json())
            .then(provinces => {
                provinceSelect.innerHTML = '<option value="">Selecciona una provincia</option>';
                provinceSelect.disabled = false;
                districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
                districtSelect.disabled = true;
                districtSelect.value = "";

                provinces.forEach(province => {
                    const option = document.createElement('option');
                    option.value = province.name;  // Guarda el nombre de la provincia
                    option.textContent = province.name;
                    provinceSelect.appendChild(option);
                });
            });
    } else {
        provinceSelect.innerHTML = '<option value="">Primero selecciona un departamento</option>';
        provinceSelect.disabled = true;
        districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
        districtSelect.disabled = true;
    }
});

// Cuando cambia la provincia, cargar distritos
document.getElementById('province').addEventListener('change', function() {
    const provinceName = this.value;
    const districtSelect = document.getElementById('district');

    if (provinceName) {
        // Necesitamos obtener el ID de la provincia por su nombre
        fetch(`/api/locations/provinces/name/${provinceName}`)
            .then(response => response.json())
            .then(province => {
                if (province && province.id) {
                    return fetch(`/api/locations/districts/${province.id}`);
                }
                throw new Error('Provincia no encontrada');
            })
            .then(response => response.json())
            .then(districts => {
                districtSelect.innerHTML = '<option value="">Selecciona un distrito</option>';
                districtSelect.disabled = false;

                districts.forEach(district => {
                    const option = document.createElement('option');
                    option.value = district.name;
                    option.textContent = district.name;
                    districtSelect.appendChild(option);
                });
            })
            .catch(error => console.error('Error cargando distritos:', error));
    } else {
        districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
        districtSelect.disabled = true;
    }
});
</script>

</body>
</html>
