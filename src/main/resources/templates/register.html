<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Registro')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="min-height: 70vh;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Crear Cuenta</h4>
                </div>
                <div class="card-body">
                    <form>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombres completos</label>
                                <input type="text" class="form-control" placeholder="Juan Pérez">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" placeholder="987654321">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" placeholder="ejemplo@conectacampo.pe">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" placeholder="••••••••">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirmar contraseña</label>
                                <input type="password" class="form-control" placeholder="••••••••">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Distrito</label>
                            <select class="form-select">
                                <option>Selecciona tu distrito</option>
                                <option>Piura</option>
                                <option>Chulucanas</option>
                                <option>Tambogrande</option>
                                <option>Morropón</option>
                                <option>Catacaos</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de cuenta</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="userType" id="farmer">
                                <label class="form-check-label" for="farmer">
                                    <i class="fas fa-tractor"></i> Soy Agricultor
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="userType" id="buyer">
                                <label class="form-check-label" for="buyer">
                                    <i class="fas fa-shopping-cart"></i> Soy Comprador
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Registrarme</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        ¿Ya tienes cuenta? <a th:href="@{/login}" class="text-success">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
