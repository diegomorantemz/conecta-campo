<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Registro')"></head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="min-height: 70vh;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Crear Cuenta</h4>
                </div>
                <div class="card-body">

                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${errors}" class="alert alert-danger">
                        <ul>
                            <li th:each="error : ${errors}" th:text="${error.defaultMessage}"></li>
                        </ul>
                    </div>

                    <form id="registerForm" th:action="@{/register}" th:object="${registerRequest}" method="post" novalidate>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" th:field="*{dni}" class="form-control"
                                   placeholder="12345678" maxlength="8"
                                   pattern="[0-9]{8}"
                                   title="El DNI debe tener 8 dígitos numéricos"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                            <small class="text-muted">8 dígitos, solo números</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombres</label>
                                <input type="text" th:field="*{name}" class="form-control"
                                       placeholder="Juan"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ]+(?: [A-Za-zÁÉÍÓÚáéíóúñÑ]+)*"
                                       title="Solo letras y espacios entre palabras (ejemplo: Juan Carlos)"
                                       oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ ]/g, '')" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellidos</label>
                                <input type="text" th:field="*{lastname}" class="form-control"
                                       placeholder="Pérez"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ]+(?: [A-Za-zÁÉÍÓÚáéíóúñÑ]+)*"
                                       title="Solo letras y espacios entre palabras (ejemplo: Pérez García)"
                                       oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ ]/g, '')" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       placeholder="ejemplo@conectacampo.pe"
                                       pattern="[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                                       title="Debe ingresar un email válido (ejemplo: usuario@dominio.com)"
                                       required>
                                <small class="text-muted">ejemplo: usuario@conectacampo.com</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" th:field="*{phone}" class="form-control"
                                       placeholder="987654321"
                                       pattern="[0-9]{9}"
                                       maxlength="9"
                                       title="El teléfono debe tener 9 dígitos numéricos"
                                       oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                                <small class="text-muted">9 dígitos, solo números (ej: 987654321)</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contraseña</label>
                                <div class="input-group">
                                    <input type="password" th:field="*{password}" id="password"
                                           class="form-control" placeholder="••••••••"
                                           minlength="6" required>
                                    <button type="button" class="btn btn-outline-secondary"
                                            onclick="togglePassword('password', this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <small class="text-muted">Mínimo 6 caracteres</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirmar contraseña</label>
                                <div class="input-group">
                                    <input type="password" th:field="*{confirmPassword}" id="confirmPassword"
                                           class="form-control" placeholder="••••••••" required>
                                    <button type="button" class="btn btn-outline-secondary"
                                            onclick="togglePassword('confirmPassword', this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Departamento</label>
                            <select th:field="*{department}" id="department" class="form-select" required>
                                <option value="">Selecciona un departamento</option>
                            </select>
                        </div>

                        <!-- Provincia -->
                        <div class="mb-3">
                            <label class="form-label">Provincia</label>
                            <select th:field="*{province}" id="province" class="form-select" required disabled>
                                <option value="">Primero selecciona un departamento</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Distrito</label>
                            <select th:field="*{district}" id="district" class="form-select" required disabled>
                                <option value="">Primero selecciona una provincia</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tipo de cuenta</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{userType}" value="farmer" id="farmer" required>
                                <label class="form-check-label" for="farmer">
                                    <i class="fas fa-tractor"></i> Soy Agricultor
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{userType}" value="buyer" id="buyer">
                                <label class="form-check-label" for="buyer">
                                    <i class="fas fa-shopping-cart"></i> Soy Comprador
                                </label>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-success w-100" disabled>
                            <i class="fas fa-spinner fa-spin me-2 d-none" id="loadingSpinner"></i>
                            Registrarme
                        </button>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        ¿Ya tienes cuenta? <a th:href="@{/login}" class="text-success">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');

    function validateForm() {
        const inputs = form.querySelectorAll('input[required], select[required]');
        let isValid = true;

        inputs.forEach(input => {
            if (input.type === 'radio') {
                const radioGroup = form.querySelectorAll(`input[name="${input.name}"]`);
                const isChecked = Array.from(radioGroup).some(r => r.checked);
                if (!isChecked) {
                    isValid = false;
                }
            } else if (input.value.trim() === '' && !input.disabled) {
                isValid = false;
            }

            if (input.pattern && input.value && !new RegExp(input.pattern).test(input.value)) {
                isValid = false;
            }
        });

        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        if (password.value && confirmPassword.value && password.value !== confirmPassword.value) {
            isValid = false;
        }

        submitBtn.disabled = !isValid;
        return isValid;
    }

    form.querySelectorAll('input, select').forEach(element => {
        element.addEventListener('input', validateForm);
        element.addEventListener('change', validateForm);
    });

    document.getElementById('confirmPassword').addEventListener('input', function() {
        const password = document.getElementById('password');
        const confirm = this;

        if (password.value !== confirm.value) {
            confirm.setCustomValidity('Las contraseñas no coinciden');
        } else {
            confirm.setCustomValidity('');
        }
        validateForm();
    });

    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    form.addEventListener('submit', function(e) {
        const spinner = document.getElementById('loadingSpinner');
        spinner.classList.remove('d-none');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Registrando...';
    });

    fetch('/api/locations/departments')
        .then(response => response.json())
        .then(departments => {
            const deptSelect = document.getElementById('department');
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept.id;  // ← Guardamos el ID
                option.textContent = dept.name;
                deptSelect.appendChild(option);
            });
            validateForm();
        })
        .catch(error => console.error('Error cargando departamentos:', error));

    document.getElementById('department').addEventListener('change', function() {
        const deptId = this.value;
        const provinceSelect = document.getElementById('province');
        const districtSelect = document.getElementById('district');

        provinceSelect.value = "";
        districtSelect.value = "";

        if (deptId) {
            fetch(`/api/locations/provinces/${deptId}`)
                .then(response => response.json())
                .then(provinces => {
                    provinceSelect.innerHTML = '<option value="">Selecciona una provincia</option>';
                    provinceSelect.disabled = false;
                    districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
                    districtSelect.disabled = true;

                    provinces.forEach(province => {
                        const option = document.createElement('option');
                        option.value = province.id;  // ← Guardamos el ID
                        option.textContent = province.name;
                        provinceSelect.appendChild(option);
                    });
                    validateForm();
                })
                .catch(error => {
                    console.error('Error cargando provincias:', error);
                    provinceSelect.innerHTML = '<option value="">Error al cargar provincias</option>';
                    provinceSelect.disabled = true;
                });
        } else {
            provinceSelect.innerHTML = '<option value="">Primero selecciona un departamento</option>';
            provinceSelect.disabled = true;
            districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
            districtSelect.disabled = true;
        }
        validateForm();
    });

    document.getElementById('province').addEventListener('change', function() {
        const provinceId = this.value;
        const districtSelect = document.getElementById('district');

        if (provinceId) {

            fetch(`/api/locations/districts/${provinceId}`)
                .then(response => response.json())
                .then(districts => {
                    districtSelect.innerHTML = '<option value="">Selecciona un distrito</option>';
                    districtSelect.disabled = false;

                    districts.forEach(district => {
                        const option = document.createElement('option');
                        option.value = district.name;
                        option.textContent = district.name;
                        districtSelect.appendChild(option);
                    });
                    validateForm();
                })
                .catch(error => {
                    console.error('Error cargando distritos:', error);
                    districtSelect.innerHTML = '<option value="">Error al cargar distritos</option>';
                    districtSelect.disabled = true;
                });
        } else {
            districtSelect.innerHTML = '<option value="">Primero selecciona una provincia</option>';
            districtSelect.disabled = true;
        }
        validateForm();
    });
</script>

</body>
</html>
